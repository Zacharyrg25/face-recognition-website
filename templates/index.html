<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Face Detection</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <main class="page">
        <section class="card">
            <p class="intro">Upload an image and the AI will draw boxes around any faces it detects. (Click <a href="{{ url_for('about') }}">here</a> to learn more.)</p>

            <div class="actions">
                <input type="file" id="imageInput" accept="image/*" hidden>
                <label id="uploadBtn" for="imageInput" class="button">Upload Image</label>
                <button id="detectBtn" class="button" type="button">Detect Face(s)</button>
            </div>

            <fieldset class="method-picker">
                <legend class="method-picker-legend">Choose Method</legend>

                <label class="radio-option">
                    <input type="radio" name="mode" value="Haar" checked>
                    <span>Haar</span>
                </label>

                <label class="radio-option">
                    <input type="radio" name="mode" value="MTCNN">
                    <span>MTCNN</span>
                </label>
            </fieldset>

            <p id="status" class="status" role="status"></p>

            <canvas id="canvas" hidden></canvas>
        </section>
    </main>

    <script src="/static/script.js"></script>
</body>
</html>
